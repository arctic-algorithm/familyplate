// ── SAFE STORAGE HELPERS ─────────────────────────────────────────
// Some browsers (iOS private mode, certain security policies) throw on storage access
function safeSessionGet(key) { try { return sessionStorage.getItem(key); } catch(e) { return null; } }
function safeSessionSet(key, val) { try { sessionStorage.setItem(key, val); } catch(e) {} }
function safeLocalGet(key) { try { return localStorage.getItem(key); } catch(e) { return null; } }
function safeLocalSet(key, val) { try { localStorage.setItem(key, val); } catch(e) {} }
function safeLocalRemove(key) { try { localStorage.removeItem(key); } catch(e) {} }

const FAMILY_PASSWORD = "Bear";

// ── PASSWORD GATE ────────────────────────────────────────────────
const SESSION_KEY = 'fp_auth';

function PasswordGate({ children }) {
  const [authed, setAuthed] = useState(() => safeSessionGet(SESSION_KEY) === '1');
  const [input, setInput] = useState('');
  const [error, setError] = useState(false);
  const [shake, setShake] = useState(false);
  const inputRef = useRef(null);

  useEffect(() => { if (!authed && inputRef.current) inputRef.current.focus(); }, [authed]);

  function handleSubmit(e) {
    e.preventDefault();
    if (input === FAMILY_PASSWORD) {
      safeSessionSet(SESSION_KEY, '1');
      setAuthed(true);
    } else {
      setError(true);
      setShake(true);
      setInput('');
      setTimeout(() => setShake(false), 600);
      if (inputRef.current) inputRef.current.focus();
    }
  }

  if (authed) return children;

  return (
    <div className="min-h-screen bg-gray-50 flex items-center justify-center p-4">
      <div className="w-full max-w-sm">
        <div className="text-center mb-8">
          <div className="text-5xl mb-3">🍽️</div>
          <h1 className="text-2xl font-bold text-gray-900">FamilyPlate</h1>
          <p className="text-gray-500 text-sm mt-1">Family access only</p>
        </div>
        <form onSubmit={handleSubmit} className={`bg-white rounded-2xl shadow-sm border border-gray-100 p-6 ${shake ? 'animate-[shake_0.5s_ease-in-out]' : ''}`}>
          <style>{`@keyframes shake{0%,100%{transform:translateX(0)}15%,45%,75%{transform:translateX(-6px)}30%,60%,90%{transform:translateX(6px)}}`}</style>
          <label className="block text-sm font-medium text-gray-700 mb-2">Password</label>
          <input
            ref={inputRef}
            type="password"
            value={input}
            onChange={e => { setInput(e.target.value); setError(false); }}
            placeholder="Enter family password"
            className={`w-full px-4 py-3 rounded-xl border text-sm outline-none transition-all ${error ? 'border-red-400 bg-red-50 focus:ring-2 focus:ring-red-200' : 'border-gray-200 focus:border-brand-500 focus:ring-2 focus:ring-brand-100'}`}
          />
          {error && <p className="text-red-500 text-xs mt-2">Wrong password. Try again.</p>}
          <button
            type="submit"
            className="mt-4 w-full bg-brand-500 hover:bg-brand-600 text-white font-semibold py-3 rounded-xl text-sm transition-colors"
          >
            Unlock
          </button>
        </form>
      </div>
    </div>
  );
}

function getWeekDates(offset=0) {
  const now = new Date();
  now.setDate(now.getDate() + offset * 7);
  const mon = new Date(now);
  mon.setDate(mon.getDate() - ((mon.getDay() + 6) % 7));
  return Array.from({length:7},(_,i)=>{
    const d = new Date(mon);
    d.setDate(d.getDate()+i);
    return d.toISOString().split('T')[0];
  });
}

/**
 * Four consecutive Monday–Sunday weeks: previous week, reference week, +2 ahead.
 * fourWeekOffset shifts the reference Monday (0 = week containing today).
 */
function getFourWeekGrid(fourWeekOffset) {
  const todayMon = new Date();
  todayMon.setHours(12, 0, 0, 0);
  todayMon.setDate(todayMon.getDate() - ((todayMon.getDay() + 6) % 7));
  const refMonday = new Date(todayMon);
  refMonday.setDate(todayMon.getDate() + fourWeekOffset * 7);
  const startMonday = new Date(refMonday);
  startMonday.setDate(refMonday.getDate() - 7);

  const weeks = [];
  for (let w = 0; w < 4; w++) {
    const row = [];
    const weekMon = new Date(startMonday);
    weekMon.setDate(startMonday.getDate() + w * 7);
    for (let i = 0; i < 7; i++) {
      const cell = new Date(weekMon);
      cell.setDate(weekMon.getDate() + i);
      row.push(cell.toISOString().split('T')[0]);
    }
    weeks.push(row);
  }
  const first = weeks[0][0];
  const last = weeks[3][6];
  const a = new Date(first + 'T12:00:00');
  const b = new Date(last + 'T12:00:00');
  const label = `${a.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} – ${b.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}`;
  return { weeks, label };
}

function daysSince(dateStr) {
  if (!dateStr) return Infinity;
  const d = new Date(dateStr+'T12:00:00');
  const t = new Date(today()+'T12:00:00');
  return Math.floor((t - d) / 86400000);
}

/** Accepts recipe URLs; returns safe http(s) href or null */
function mealUrlHref(raw) {
  if (!raw || typeof raw !== 'string') return null;
  const t = raw.trim();
  if (!t) return null;
  try {
    const u = new URL(/^https?:\/\//i.test(t) ? t : `https://${t}`);
    if (u.protocol === 'http:' || u.protocol === 'https:') return u.href;
  } catch (e) {}
  return null;
}

const FIREBASE_URL = 'https://familyplate-b4ba9-default-rtdb.firebaseio.com/familyplate.json';

// Firebase Realtime DB converts empty arrays to null and may convert
// arrays to objects with numeric keys ({0: …, 1: …}).  This helper
// ensures every field the app expects as an array IS an array, and
// nested objects (household.members, each member's preferences) are
// also normalised.
function normalizeFirebaseData(data) {
  if (!data || typeof data !== 'object') return null;

  // Convert Firebase object-with-numeric-keys → array, keep real arrays,
  // and turn null / undefined → fallback.
  function toArray(val, fallback = []) {
    if (val === null || val === undefined) return fallback;
    if (Array.isArray(val)) return val;
    if (typeof val === 'object') {
      // Firebase numeric-keyed object → array (filter out holes)
      const keys = Object.keys(val);
      if (keys.every(k => /^\d+$/.test(k))) {
        return keys.sort((a,b) => +a - +b).map(k => val[k]).filter(Boolean);
      }
      return fallback;            // Not a numeric-keyed object
    }
    return fallback;
  }

  const meals = toArray(data.meals);
  const restaurants = toArray(data.restaurants);

  // Normalise each meal's tags and history arrays
  const normMeals = meals.map(m => ({
    ...m,
    tags: toArray(m.tags),
    history: toArray(m.history),
    link: typeof m.link === 'string' ? m.link : '',
    description: typeof m.description === 'string' ? m.description : '',
  }));

  // Normalise household members & their nested preference arrays
  let household = data.household || DEFAULT_HOUSEHOLD;
  if (household) {
    const members = toArray(household.members, DEFAULT_HOUSEHOLD.members);
    household = {
      ...DEFAULT_HOUSEHOLD,
      ...household,
      members: members.map(mem => ({
        ...mem,
        preferences: {
          dietary:   toArray(mem.preferences?.dietary),
          dislikes:  toArray(mem.preferences?.dislikes),
          allergens: toArray(mem.preferences?.allergens),
        },
      })),
    };
  }

  // Normalise restaurant openDays arrays
  const normRestaurants = restaurants.map(r => ({
    ...r,
    openDays: toArray(r.openDays),
  }));

  // Normalise emailSettings
  let emailSettings = data.emailSettings || EMPTY_STATE.emailSettings;
  if (emailSettings) {
    emailSettings = {
      ...EMPTY_STATE.emailSettings,
      ...emailSettings,
      familyEmails: toArray(emailSettings.familyEmails),
      confirmations: emailSettings.confirmations || {},
    };
  }

  return {
    ...data,
    meals: normMeals,
    restaurants: normRestaurants,
    household,
    plans: data.plans || {},
    dayDesignations: normalizeDayDesignations(data.dayDesignations),
    onboarded: !!data.onboarded,
    emailSettings,
  };
}

async function loadFromFirebase() {
  try {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 5000); // 5-second timeout
    const res = await fetch(FIREBASE_URL, { signal: controller.signal });
    clearTimeout(timer);
    if (!res.ok) return null;
    const raw = await res.json();
    const data = normalizeFirebaseData(raw);
    if (data) safeLocalSet('familyplate', JSON.stringify(data)); // cache locally
    return data;
  } catch(e) {
    console.warn('[FamilyPlate] Firebase load failed, using local cache:', e.message);
    return null;
  }
}

let _saveTimer = null;
function saveState(state) {
  // Write to localStorage immediately for fast local access
  safeLocalSet('familyplate', JSON.stringify(state));
  // Debounce Firebase writes to avoid hammering on rapid changes
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(() => {
    const ctrl = new AbortController();
    setTimeout(() => ctrl.abort(), 8000);
    fetch(FIREBASE_URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(state),
      signal: ctrl.signal,
    }).catch(() => {});
  }, 1000);
}

function loadCachedState() {
  try {
    const raw = safeLocalGet('familyplate');
    if (raw) {
      const parsed = JSON.parse(raw);
      return normalizeFirebaseData(parsed) || parsed;
    }
  } catch(e) {}
  return null;
}

function normalizeDayDesignations(raw) {
  if (!raw || typeof raw !== 'object') return {};
  const out = {};
  for (const [k, v] of Object.entries(raw)) {
    if (/^\d{4}-\d{2}-\d{2}$/.test(k) && typeof v === 'string' && v.trim()) {
      out[k] = v.trim().slice(0, 80);
    }
  }
  return out;
}

// ── ONBOARDING ──────────────────────────────────────────────────
const Onboarding = () => {
  const { state, dispatch } = useApp();
  const [step, setStep] = useState(0);
  const [houseName, setHouseName] = useState('Our Family');
  const [members, setMembers] = useState(DEFAULT_HOUSEHOLD.members);
  const [selectedMeals, setSelectedMeals] = useState(new Set());

  const updateMember = (id, field, val) => setMembers(m => m.map(x => x.id === id ? {...x, [field]: val} : x));

  const finish = () => {
    const newMeals = COMMON_MEALS.filter((_,i) => selectedMeals.has(i)).map(m => ({
      id: uid(), ...m, link: '', description: '', toddlerSafe: m.tags.includes('Toddler-Safe'), adultOnly: m.tags.includes('Spicy'),
      history: [], createdAt: today()
    }));
    dispatch({type:'SETUP', payload:{
      household: {...DEFAULT_HOUSEHOLD, name: houseName, members},
      meals: newMeals, onboarded: true
    }});
  };

  const steps = [
    // Step 0: Welcome
    <div key="welcome" className="text-center py-8 fade-in">
      <div className="text-6xl mb-6">🍽️</div>
      <h1 className="text-3xl font-bold text-gray-900 mb-3">Welcome to FamilyPlate</h1>
      <p className="text-gray-500 mb-8 max-w-md mx-auto">Take the stress out of meal planning. Let's set up your household in under a minute.</p>
      <button onClick={()=>setStep(1)} className="px-8 py-3 bg-brand-500 text-white rounded-xl font-semibold hover:bg-brand-600 transition shadow-lg shadow-brand-500/25">Get Started</button>
    </div>,
    // Step 1: Household Name & Members
    <div key="household" className="py-4 fade-in">
      <h3 className="text-xl font-semibold mb-4">Name your household</h3>
      <input value={houseName} onChange={e=>setHouseName(e.target.value)} className="w-full px-4 py-3 border border-gray-200 rounded-xl mb-6 focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none" placeholder="e.g. The Smiths" />
      <h3 className="text-xl font-semibold mb-4">Your household members</h3>
      <div className="space-y-3">
        {members.map(m => (
          <div key={m.id} className="flex items-center gap-3 p-3 bg-gray-50 rounded-xl">
            <span className="text-2xl">{m.type==='adult'?'👤':'👶'}</span>
            <input value={m.name} onChange={e=>updateMember(m.id,'name',e.target.value)} className="flex-1 px-3 py-2 bg-white border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-brand-500 outline-none" />
            <span className="text-xs text-gray-400 capitalize">{m.type}{m.age?` (${m.age}yr)`:''}</span>
          </div>
        ))}
      </div>
      <div className="flex justify-end mt-6">
        <button onClick={()=>setStep(2)} className="px-6 py-2.5 bg-brand-500 text-white rounded-xl font-medium hover:bg-brand-600 transition">Next</button>
      </div>
    </div>,
    // Step 2: Seed Meal Library
    <div key="meals" className="py-4 fade-in">
      <h3 className="text-xl font-semibold mb-2">Seed your meal library</h3>
      <p className="text-gray-500 text-sm mb-4">Pick meals your family enjoys. You can add more later.</p>
      <div className="grid grid-cols-2 sm:grid-cols-3 gap-2 max-h-[50vh] overflow-y-auto pr-1">
        {COMMON_MEALS.map((m,i) => (
          <button key={i} onClick={()=>{const s=new Set(selectedMeals); s.has(i)?s.delete(i):s.add(i); setSelectedMeals(s);}}
            className={`p-3 rounded-xl border text-left text-sm transition ${selectedMeals.has(i)?'border-brand-500 bg-brand-50 ring-2 ring-brand-500/20':'border-gray-200 hover:border-gray-300 bg-white'}`}>
            <div className="font-medium text-gray-900">{m.name}</div>
            <div className="text-xs text-gray-400 mt-0.5">{m.cuisine} &middot; {m.prepTime}min</div>
          </button>
        ))}
      </div>
      <p className="text-sm text-gray-400 mt-3">{selectedMeals.size} meals selected</p>
      <div className="flex justify-between mt-4">
        <button onClick={()=>setStep(1)} className="px-6 py-2.5 text-gray-600 rounded-xl font-medium hover:bg-gray-100 transition">Back</button>
        <button onClick={finish} className="px-6 py-2.5 bg-brand-500 text-white rounded-xl font-medium hover:bg-brand-600 transition">{selectedMeals.size>0?`Start Planning (${selectedMeals.size} meals)`:'Skip & Start'}</button>
      </div>
    </div>,
  ];

  return <div className="min-h-screen flex items-center justify-center p-4"><div className="w-full max-w-lg">{steps[step]}</div></div>;
};

// ── MEAL SLOT COMPONENT ─────────────────────────────────────────
const MealSlot = ({date, slotType, plan, onAdd, onRemove, onSuggest, compact, micro, dragSource, onDragStart, onDragEnd, onDrop}) => {
  const { state } = useApp();
  const slot = plan?.[slotType];
  const slotLabel = slotType === 'breakfast' ? 'B' : slotType === 'lunch' ? 'L' : 'D';
  const slotFull = slotType === 'breakfast' ? 'Breakfast' : slotType === 'lunch' ? 'Lunch' : 'Dinner';
  const [isDragOver, setIsDragOver] = useState(false);

  const isSelf = dragSource && dragSource.date === date && dragSource.slot === slotType;
  const isDragging = !!dragSource;

  const dropHandlers = {
    onDragOver: e => { e.preventDefault(); if (!isSelf) setIsDragOver(true); },
    onDragLeave: () => setIsDragOver(false),
    onDrop: e => { e.preventDefault(); setIsDragOver(false); if (!isSelf) onDrop(date, slotType); },
  };

  if (!slot || slot.type === 'empty') {
    if (micro) {
      return (
        <div
          {...dropHandlers}
          className={`group border border-dashed rounded-md px-0.5 py-0.5 flex items-center justify-center min-h-[18px] transition cursor-pointer ${isDragOver ? 'border-brand-400 bg-brand-50' : 'border-gray-200 hover:border-brand-400 hover:bg-brand-50/30'}`}
          onClick={()=>{ if (!isDragging) onAdd(date, slotType); }}
        >
          <span className="text-[9px] text-gray-400 tabular-nums">{isDragOver ? '↓' : slotLabel}</span>
        </div>
      );
    }
    return (
      <div
        {...dropHandlers}
        className={`group border border-dashed rounded-xl transition cursor-pointer ${compact?'p-2':'p-3'} ${isDragOver ? 'border-brand-400 bg-brand-50 scale-[1.02]' : 'border-gray-200 hover:border-brand-400 hover:bg-brand-50/30'}`}
        onClick={()=>{ if (!isDragging) onAdd(date, slotType); }}
      >
        <div className="flex items-center justify-between">
          {!compact && <span className="text-xs font-medium text-gray-400 uppercase">{slotFull}</span>}
          <div className="flex gap-1">
            <button onClick={(e)=>{e.stopPropagation();onSuggest(date,slotType)}} className="p-1 rounded-md opacity-0 group-hover:opacity-100 hover:bg-brand-100 text-brand-500 transition" title="Suggest a meal">
              <Icon name="sparkles" size={14} />
            </button>
            <span className="p-1 rounded-md opacity-0 group-hover:opacity-100 text-gray-400"><Icon name="plus" size={14} /></span>
          </div>
        </div>
        {compact && <span className="text-xs text-gray-300">{isDragOver ? '↓' : slotLabel}</span>}
      </div>
    );
  }

  const isHome = slot.type === 'home';
  const item = isHome
    ? state.meals.find(m => m.id === slot.mealId)
    : state.restaurants.find(r => r.id === slot.mealId);
  const name = item?.name || 'Unknown';

  // Repetition check
  const rWin = state.household.repetitionWindow;
  const lastPlanned = isHome ? getLastPlanned(state.plans, slot.mealId, date) : getLastPlannedRestaurant(state.plans, slot.mealId, date);
  const withinWindow = lastPlanned && daysSince(lastPlanned) < rWin && lastPlanned !== date;

  return (
    <div
      draggable
      onDragStart={() => onDragStart(date, slotType)}
      onDragEnd={onDragEnd}
      {...dropHandlers}
      className={`border transition relative group ${micro?'rounded-md p-0.5':'rounded-xl '+(compact?'p-2':'p-3')} ${isHome?'bg-home-light/50 border-home/20':'bg-restaurant-light/50 border-restaurant/20'} ${isSelf ? 'opacity-40 scale-95' : ''} ${isDragOver ? 'ring-2 ring-brand-400 scale-[1.02]' : ''} cursor-grab active:cursor-grabbing`}
    >
      <div className="flex items-start justify-between gap-0.5">
        <div className="min-w-0 flex-1">
          {!compact && !micro && <span className="text-xs font-medium uppercase text-gray-400 block mb-0.5">{slotFull}</span>}
          <span className={`font-medium block truncate ${micro?'text-[9px] leading-tight':compact?'text-xs':'text-sm'}`} title={name}>{micro ? `${slotLabel} ${name}` : name}</span>
          {!compact && !micro && item?.cuisine && <span className="text-xs text-gray-400">{item.cuisine}</span>}
          {isHome && item?.description && !compact && !micro && (
            <p className="text-xs text-gray-500 mt-1 line-clamp-2">{item.description}</p>
          )}
          {isHome && mealUrlHref(item?.link) && !micro && (
            <a href={mealUrlHref(item.link)} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()}
              className={`inline-flex items-center gap-0.5 mt-0.5 text-brand-600 hover:text-brand-700 ${compact?'text-[10px]':'text-xs'}`}>
              <Icon name="globe" size={compact?10:12} /> {!compact && 'Link'}
            </a>
          )}
        </div>
        <button onClick={()=>onRemove(date,slotType)} className={`rounded hover:bg-red-50 text-red-400 flex-shrink-0 ${micro?'p-0.5 opacity-80':'p-1 opacity-0 group-hover:opacity-100'} transition`} title="Remove">
          <Icon name="x" size={micro?10:14} />
        </button>
      </div>
      {withinWindow && !micro && (
        <div className="flex items-center gap-1 mt-1.5 text-amber-600" title={`Last planned ${daysSince(lastPlanned)} days ago (window: ${rWin} days)`}>
          <Icon name="alert" size={12} />
          <span className="text-xs font-medium">Repeat</span>
        </div>
      )}
      {slot.perPerson && Object.keys(slot.perPerson).length > 0 && !micro && (
        <div className="mt-1.5 space-y-0.5">
          {Object.entries(slot.perPerson).map(([mid, mealId]) => {
            const member = state.household.members.find(m=>m.id===mid);
            const meal = state.meals.find(m=>m.id===mealId);
            return meal ? <div key={mid} className="text-xs text-gray-500 truncate">{member?.name}: {meal.name}</div> : null;
          })}
        </div>
      )}
    </div>
  );
};

function getLastPlanned(plans, mealId, excludeDate) {
  let latest = null;
  for (const [date, day] of Object.entries(plans)) {
    if (date === excludeDate) continue;
    for (const slot of ['breakfast','lunch','dinner']) {
      if (day[slot]?.mealId === mealId && (!latest || date > latest)) latest = date;
    }
  }
  return latest;
}
function getLastPlannedRestaurant(plans, mealId, excludeDate) {
  return getLastPlanned(plans, mealId, excludeDate);
}

// ── ADD MEAL TO SLOT MODAL ──────────────────────────────────────
const AddMealModal = ({open, onClose, date, slotType, onSelect}) => {
  const { state, dispatch } = useApp();
  const [tab, setTab] = useState('home');
  const [search, setSearch] = useState('');
  const [quickName, setQuickName] = useState('');

  const filteredMeals = useMemo(() => {
    const q = search.toLowerCase();
    return state.meals.filter(m => {
      if (m.name.toLowerCase().includes(q) || m.cuisine.toLowerCase().includes(q)) return true;
      const desc = (m.description || '').toLowerCase();
      return desc && desc.includes(q);
    });
  }, [state.meals, search]);

  const dateDayName = dayName(date);
  const filteredRestaurants = useMemo(() => {
    return state.restaurants.filter(r => {
      if (!r.name.toLowerCase().includes(search.toLowerCase())) return false;
      if (r.openDays && !r.openDays.includes(dateDayName)) return false;
      return true;
    });
  }, [state.restaurants, search, dateDayName]);

  const quickAdd = () => {
    if (!quickName.trim()) return;
    const meal = { id: uid(), name: quickName.trim(), cuisine: 'Other', prepTime: 30, tags: [], toddlerSafe: false, adultOnly: false, link: '', description: '', history: [], createdAt: today() };
    dispatch({type:'ADD_MEAL', payload: meal});
    onSelect(date, slotType, 'home', meal.id);
    setQuickName('');
    onClose();
  };

  const selectMeal = (mealId) => { onSelect(date, slotType, 'home', mealId); onClose(); };
  const selectRestaurant = (restId) => { onSelect(date, slotType, 'restaurant', restId); onClose(); };

  const slotFull = slotType === 'breakfast' ? 'Breakfast' : slotType === 'lunch' ? 'Lunch' : 'Dinner';

  return (
    <Modal open={open} onClose={onClose} title={`${slotFull} — ${new Date(date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short', month:'short', day:'numeric'})}`} wide>
      {/* Quick add bar */}
      <div className="flex gap-2 mb-4">
        <input value={quickName} onChange={e=>setQuickName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&quickAdd()} className="flex-1 px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-brand-500 outline-none" placeholder="Quick add — type a meal name and press Enter" />
        <button onClick={quickAdd} disabled={!quickName.trim()} className="px-4 py-2.5 bg-brand-500 text-white rounded-xl text-sm font-medium hover:bg-brand-600 transition disabled:opacity-40"><Icon name="plus" size={16} /></button>
      </div>

      {/* Tabs */}
      <div className="flex gap-1 mb-4 bg-gray-100 rounded-xl p-1">
        <button onClick={()=>setTab('home')} className={`flex-1 py-2 rounded-lg text-sm font-medium transition ${tab==='home'?'bg-white shadow text-home':'text-gray-500 hover:text-gray-700'}`}>Home Meals ({state.meals.length})</button>
        <button onClick={()=>setTab('restaurant')} className={`flex-1 py-2 rounded-lg text-sm font-medium transition ${tab==='restaurant'?'bg-white shadow text-restaurant':'text-gray-500 hover:text-gray-700'}`}>Restaurants ({state.restaurants.length})</button>
      </div>

      {/* Search */}
      <div className="relative mb-3">
        <Icon name="search" size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" />
        <input value={search} onChange={e=>setSearch(e.target.value)} className="w-full pl-9 pr-4 py-2 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-brand-500 outline-none" placeholder={`Search ${tab==='home'?'meals':'restaurants'}...`} />
      </div>

      {/* List */}
      <div className="space-y-2 max-h-[40vh] overflow-y-auto">
        {tab === 'home' && filteredMeals.map(m => {
          const rWin = state.household.repetitionWindow;
          const last = getLastPlanned(state.plans, m.id, date);
          const withinWindow = last && daysSince(last) < rWin;
          const blocked = withinWindow && state.household.repetitionMode === 'block';
          return (
            <button key={m.id} onClick={()=>!blocked&&selectMeal(m.id)} disabled={blocked}
              className={`w-full text-left p-3 rounded-xl border transition flex items-center gap-3 ${blocked?'opacity-40 cursor-not-allowed border-gray-200':'hover:border-home/40 hover:bg-home-light/30 border-gray-200'}`}>
              <div className="w-10 h-10 rounded-lg bg-home-light flex items-center justify-center text-home flex-shrink-0"><Icon name="utensils" size={18} /></div>
              <div className="flex-1 min-w-0">
                <div className="font-medium text-sm truncate">{m.name}</div>
                <div className="text-xs text-gray-400">{m.cuisine} {m.prepTime?`· ${m.prepTime}min`:''} {m.tags.length?`· ${m.tags.slice(0,2).join(', ')}`:''}</div>
                {m.description && <div className="text-xs text-gray-500 mt-0.5 line-clamp-2">{m.description}</div>}
              </div>
              {withinWindow && <span className="text-xs px-2 py-1 rounded-full bg-amber-50 text-amber-600 font-medium flex-shrink-0">{blocked?'Blocked':'Repeat'}</span>}
            </button>
          );
        })}
        {tab === 'restaurant' && filteredRestaurants.map(r => (
          <button key={r.id} onClick={()=>selectRestaurant(r.id)}
            className="w-full text-left p-3 rounded-xl border border-gray-200 hover:border-restaurant/40 hover:bg-restaurant-light/30 transition flex items-center gap-3">
            <div className="w-10 h-10 rounded-lg bg-restaurant-light flex items-center justify-center text-restaurant flex-shrink-0"><Icon name="store" size={18} /></div>
            <div className="flex-1 min-w-0">
              <div className="font-medium text-sm truncate">{r.name}</div>
              <div className="text-xs text-gray-400">{r.cuisine} · {r.priceRange}</div>
            </div>
            {r.isFavorite && <span className="text-red-400"><Icon name="heartFill" size={14} /></span>}
          </button>
        ))}
        {tab === 'home' && filteredMeals.length === 0 && <p className="text-sm text-gray-400 text-center py-8">No meals found. Add one with quick-add above!</p>}
        {tab === 'restaurant' && filteredRestaurants.length === 0 && (
          <p className="text-sm text-gray-400 text-center py-8">
            {state.restaurants.length === 0
              ? 'No restaurants saved yet. Add one from the Restaurants tab.'
              : `No restaurants open on ${dateDayName}. Edit a restaurant to update its open days.`}
          </p>
        )}
      </div>
    </Modal>
  );
};

// ── SUGGESTION MODAL ────────────────────────────────────────────
const SuggestModal = ({open, onClose, date, slotType, onSelect}) => {
  const { state } = useApp();
  const [suggestions, setSuggestions] = useState([]);

  const generateSuggestions = useCallback(() => {
    const rWin = state.household.repetitionWindow;
    const weekDates = getWeekDates(0);
    const weekCuisines = {};
    weekDates.forEach(d => {
      const p = state.plans[d];
      if (!p) return;
      ['breakfast','lunch','dinner'].forEach(s => {
        if (p[s]?.type === 'home') {
          const m = state.meals.find(x => x.id === p[s].mealId);
          if (m) weekCuisines[m.cuisine] = (weekCuisines[m.cuisine]||0) + 1;
        }
      });
    });

    const eligible = state.meals.filter(m => {
      const last = getLastPlanned(state.plans, m.id, date);
      return !last || daysSince(last) >= rWin;
    });

    // Score: prefer underrepresented cuisines, variety
    const scored = eligible.map(m => ({
      ...m,
      score: 10 - (weekCuisines[m.cuisine] || 0) * 3 + Math.random() * 4
    }));
    scored.sort((a,b) => b.score - a.score);
    setSuggestions(scored.slice(0, 3));
  }, [state, date]);

  useEffect(() => { if (open) generateSuggestions(); }, [open, generateSuggestions]);

  return (
    <Modal open={open} onClose={onClose} title="Meal Suggestions">
      <p className="text-sm text-gray-500 mb-4">Based on your library, avoiding recent repeats and balancing variety:</p>
      <div className="space-y-3">
        {suggestions.map((m, i) => (
          <button key={m.id} onClick={()=>{onSelect(date,slotType,'home',m.id);onClose();}}
            className="w-full text-left p-4 rounded-xl border border-gray-200 hover:border-brand-400 hover:bg-brand-50/30 transition">
            <div className="flex items-center gap-3">
              <div className="w-8 h-8 rounded-lg bg-brand-100 flex items-center justify-center text-brand-600 font-bold text-sm">{i+1}</div>
              <div>
                <div className="font-medium">{m.name}</div>
                <div className="text-xs text-gray-400">{m.cuisine} · {m.prepTime}min</div>
              </div>
            </div>
          </button>
        ))}
        {suggestions.length === 0 && <p className="text-sm text-gray-400 text-center py-6">No eligible meals found. Add more meals to your library!</p>}
      </div>
      <button onClick={generateSuggestions} className="mt-4 flex items-center gap-2 mx-auto px-4 py-2 text-sm text-brand-600 hover:bg-brand-50 rounded-xl transition">
        <Icon name="shuffle" size={16} /> Shuffle suggestions
      </button>
    </Modal>
  );
};

function DayDesignationTrigger({ date, onOpen, compact }) {
  const { state } = useApp();
  const label = state.dayDesignations?.[date] || '';
  return (
    <button type="button" onClick={(e)=>{ e.stopPropagation(); onOpen(date); }}
      className={`w-full rounded-md transition focus:outline-none focus:ring-2 focus:ring-violet-300 ${label ? 'hover:bg-violet-50/80' : 'text-gray-400 hover:text-violet-700 hover:bg-gray-50'} ${compact ? 'py-0.5 px-0.5 -mx-0.5' : 'py-1'}`}
      title={label ? 'Edit day designation' : 'Set day designation (birthday, vacation, …)'}>
      {label ? (
        <span className={`block max-w-full truncate rounded-full bg-violet-100 text-violet-900 font-medium ${compact ? 'text-[9px] px-1 py-px' : 'text-[10px] md:text-xs px-2 py-0.5'}`}>{label}</span>
      ) : (
        <span className={`${compact ? 'text-[8px]' : 'text-[10px] md:text-xs'} text-gray-400`}>+ Label</span>
      )}
    </button>
  );
}

const DayDesignationModal = ({ date, onClose }) => {
  const { state, dispatch } = useApp();
  const current = state.dayDesignations?.[date] || '';
  const [custom, setCustom] = useState(current);
  useEffect(() => { setCustom(current); }, [date, current]);

  const save = (label) => {
    dispatch({ type: 'SET_DAY_DESIGNATION', payload: { date, label: label || '' } });
    onClose();
  };

  const pretty = new Date(date + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric', year: 'numeric' });

  return (
    <Modal open={true} onClose={onClose} title="Day designation">
      <p className="text-sm text-gray-600 mb-1">{pretty}</p>
      <p className="text-xs text-gray-400 mb-4">Mark birthdays, trips, or other special days.</p>
      <div className="flex flex-wrap gap-2 mb-4">
        {DAY_DESIGNATION_PRESETS.map(p => (
          <button key={p} type="button" onClick={() => save(p)}
            className={`px-3 py-1.5 rounded-full text-sm font-medium border transition ${current === p ? 'bg-violet-600 text-white border-violet-600' : 'border-gray-200 bg-white text-gray-700 hover:border-violet-300'}`}>{p}</button>
        ))}
      </div>
      <label className="text-sm font-medium text-gray-700 mb-1 block">Custom</label>
      <input value={custom} onChange={e => setCustom(e.target.value)} maxLength={80} className="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-brand-500 outline-none mb-4" placeholder="e.g. School play" />
      <div className="flex flex-wrap justify-between gap-2 pt-2 border-t border-gray-100">
        <button type="button" onClick={() => save('')} className="px-4 py-2 text-sm text-gray-600 hover:bg-gray-100 rounded-xl transition">Clear</button>
        <div className="flex gap-2">
          <button type="button" onClick={onClose} className="px-4 py-2 text-sm text-gray-600 hover:bg-gray-100 rounded-xl transition">Cancel</button>
          <button type="button" onClick={() => save(custom)} className="px-5 py-2 bg-brand-500 text-white rounded-xl text-sm font-medium hover:bg-brand-600 transition">Save</button>
        </div>
      </div>
    </Modal>
  );
};

// ── WEEKLY CALENDAR ─────────────────────────────────────────────
const WeeklyCalendar = () => {
  const { state } = useApp();
  const [planView, setPlanView] = useState('week');
  const [weekOffset, setWeekOffset] = useState(0);
  const [fourWeekOffset, setFourWeekOffset] = useState(0);
  const [addModal, setAddModal] = useState(null);
  const [suggestModal, setSuggestModal] = useState(null);
  const [designationModal, setDesignationModal] = useState(null);
  const [mobileDay, setMobileDay] = useState(0);

  const dates = useMemo(() => getWeekDates(weekOffset), [weekOffset]);

  const fourWeekGrid = useMemo(() => getFourWeekGrid(fourWeekOffset), [fourWeekOffset]);

  const [dragSource, setDragSource] = useState(null);

  const handleSelect = (date, slot, type, mealId, perPerson) => {
    dispatch({type:'SET_SLOT', payload:{date, slot, data:{type, mealId, perPerson: perPerson || null}}});
  };
  const handleRemove = (date, slot) => {
    dispatch({type:'SET_SLOT', payload:{date, slot, data:{type:'empty'}}});
  };
  const handleDragStart = (date, slot) => setDragSource({ date, slot });
  const handleDragEnd = () => setDragSource(null);
  const handleDrop = (toDate, toSlot) => {
    if (!dragSource) return;
    dispatch({ type: 'SWAP_SLOTS', payload: { from: dragSource, to: { date: toDate, slot: toSlot } } });
    setDragSource(null);
  };

  const slotProps = { dragSource, onDragStart: handleDragStart, onDragEnd: handleDragEnd, onDrop: handleDrop };

  const todayStr = today();
  const isThisWeek = dates.includes(todayStr);

  const subtitleWeek = `${monthName(dates[0])}${!isThisWeek ? ` · Week of ${new Date(dates[0]+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}` : ' · This Week'}`;
  const subtitleFourWeek = fourWeekOffset === 0
    ? `${fourWeekGrid.label} · Previous week, this week, +2 weeks ahead`
    : fourWeekGrid.label;

  return (
    <div className="fade-in">
      <div className="flex flex-col gap-4 sm:flex-row sm:items-start sm:justify-between mb-6">
        <div className="min-w-0">
          <h1 className="text-2xl font-bold text-gray-900">Meal Plan</h1>
          <p className="text-sm text-gray-400 mt-0.5">{planView === 'week' ? subtitleWeek : subtitleFourWeek}</p>
          <div className="mt-3 inline-flex rounded-xl border border-gray-200 p-1 bg-gray-50/80" role="tablist" aria-label="Plan view">
            <button type="button" role="tab" aria-selected={planView === 'week'} onClick={()=>setPlanView('week')}
              className={`px-4 py-1.5 rounded-lg text-sm font-medium transition ${planView === 'week' ? 'bg-white shadow text-gray-900' : 'text-gray-500 hover:text-gray-700'}`}>
              Week
            </button>
            <button type="button" role="tab" aria-selected={planView === 'fourweek'} onClick={()=>setPlanView('fourweek')}
              className={`px-4 py-1.5 rounded-lg text-sm font-medium transition ${planView === 'fourweek' ? 'bg-white shadow text-gray-900' : 'text-gray-500 hover:text-gray-700'}`}>
              4 weeks
            </button>
          </div>
        </div>
        <div className="flex items-center gap-2 flex-shrink-0">
          {planView === 'week' ? (
            <>
              <button type="button" onClick={()=>setWeekOffset(w=>w-1)} className="p-2 rounded-xl hover:bg-gray-100 text-gray-500 transition" aria-label="Previous week"><Icon name="chevLeft" /></button>
              {weekOffset !== 0 && <button type="button" onClick={()=>setWeekOffset(0)} className="px-3 py-1.5 text-sm font-medium text-brand-600 hover:bg-brand-50 rounded-xl transition">Today</button>}
              <button type="button" onClick={()=>setWeekOffset(w=>w+1)} className="p-2 rounded-xl hover:bg-gray-100 text-gray-500 transition" aria-label="Next week"><Icon name="chevRight" /></button>
            </>
          ) : (
            <>
              <button type="button" onClick={()=>setFourWeekOffset(o=>o-1)} className="p-2 rounded-xl hover:bg-gray-100 text-gray-500 transition" aria-label="Shift 4 weeks earlier"><Icon name="chevLeft" /></button>
              {fourWeekOffset !== 0 && <button type="button" onClick={()=>setFourWeekOffset(0)} className="px-3 py-1.5 text-sm font-medium text-brand-600 hover:bg-brand-50 rounded-xl transition">Today</button>}
              <button type="button" onClick={()=>setFourWeekOffset(o=>o+1)} className="p-2 rounded-xl hover:bg-gray-100 text-gray-500 transition" aria-label="Shift 4 weeks later"><Icon name="chevRight" /></button>
            </>
          )}
        </div>
      </div>

      {planView === 'week' && (
        <>
          <div className="hidden md:block">
            <div className="grid grid-cols-7 gap-3">
              {dates.map(d => {
                const isToday = d === todayStr;
                const plan = state.plans[d] || {};
                return (
                  <div key={d} className={`rounded-2xl p-3 transition ${isToday ? 'bg-brand-50 ring-2 ring-brand-500/20' : 'bg-white'} border border-gray-100 shadow-sm`}>
                    <div className={`text-center mb-2 ${isToday?'':'text-gray-500'}`}>
                      <div className="text-xs font-medium uppercase">{dayName(d)}</div>
                      <div className={`text-lg font-bold ${isToday?'text-brand-600':''}`}>{dayNum(d)}</div>
                    </div>
                    <div className="mb-2">
                      <DayDesignationTrigger date={d} onOpen={setDesignationModal} />
                    </div>
                    <div className="space-y-2">
                      {['breakfast','lunch','dinner'].map(s => (
                        <MealSlot key={s} date={d} slotType={s} plan={plan} compact
                          onAdd={(date,slot)=>setAddModal({date,slot})}
                          onRemove={handleRemove}
                          onSuggest={(date,slot)=>setSuggestModal({date,slot})}
                          {...slotProps} />
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          <div className="md:hidden">
            <div className="flex gap-1 mb-4 overflow-x-auto pb-1">
              {dates.map((d,i) => {
                const isToday = d === todayStr;
                return (
                  <button key={d} type="button" onClick={()=>setMobileDay(i)}
                    className={`flex-shrink-0 w-12 py-2 rounded-xl text-center transition ${mobileDay===i?(isToday?'bg-brand-500 text-white':'bg-gray-900 text-white'):(isToday?'bg-brand-50 text-brand-600':'bg-white text-gray-500 border border-gray-100')}`}>
                    <div className="text-xs font-medium">{dayName(d)}</div>
                    <div className="text-lg font-bold">{dayNum(d)}</div>
                  </button>
                );
              })}
            </div>
            {(() => {
              const d = dates[mobileDay];
              const plan = state.plans[d] || {};
              return (
                <div className="space-y-3 fade-in">
                  <div className="px-0.5">
                    <DayDesignationTrigger date={d} onOpen={setDesignationModal} />
                  </div>
                  {['breakfast','lunch','dinner'].map(s => (
                    <MealSlot key={s} date={d} slotType={s} plan={plan}
                      onAdd={(date,slot)=>setAddModal({date,slot})}
                      onRemove={handleRemove}
                      onSuggest={(date,slot)=>setSuggestModal({date,slot})}
                      {...slotProps} />
                  ))}
                </div>
              );
            })()}
          </div>
        </>
      )}

      {planView === 'fourweek' && (
        <div className="overflow-x-auto -mx-1 px-1">
          <div className="min-w-[320px] md:min-w-0">
            <div className="grid grid-cols-7 gap-0.5 md:gap-2 mb-1 md:mb-2">
              {WEEKDAY_LABELS_MON.map(wd => (
                <div key={wd} className="text-center text-[10px] md:text-xs font-semibold text-gray-400 uppercase tracking-wide py-1">{wd}</div>
              ))}
            </div>
            {fourWeekGrid.weeks.map((row, wi) => (
              <div key={wi} className={`rounded-xl p-0.5 md:p-1 mb-1.5 md:mb-2 last:mb-0 ${wi === 1 && fourWeekOffset === 0 ? 'ring-1 ring-brand-200/70 bg-brand-50/25' : ''}`}>
                <div className="grid grid-cols-7 gap-0.5 md:gap-2">
                  {row.map((d) => {
                    const isToday = d === todayStr;
                    const plan = state.plans[d] || {};
                    return (
                      <div key={d} className={`rounded-lg md:rounded-2xl border p-1 md:p-2 flex flex-col min-h-[88px] md:min-h-[148px] ${isToday ? 'bg-brand-50/80 ring-1 md:ring-2 ring-brand-500/25 border-brand-200' : 'bg-white border-gray-100 shadow-sm'}`}>
                        <div className={`text-center mb-0.5 md:mb-1.5 flex-shrink-0 ${isToday ? 'text-brand-700' : 'text-gray-500'}`}>
                          <div className="text-[9px] md:text-xs font-medium uppercase leading-none">{dayName(d)}</div>
                          <div className={`text-xs md:text-lg font-bold leading-tight ${isToday ? 'text-brand-600' : ''}`}>{dayNum(d)}</div>
                        </div>
                        <div className="mb-0.5 flex-shrink-0 min-h-0">
                          <DayDesignationTrigger date={d} onOpen={setDesignationModal} compact />
                        </div>
                        <div className="space-y-0.5 flex-1 min-h-0 flex flex-col justify-start">
                          {['breakfast','lunch','dinner'].map(s => (
                            <MealSlot key={s} date={d} slotType={s} plan={plan} compact micro
                              onAdd={(date,slot)=>setAddModal({date,slot})}
                              onRemove={handleRemove}
                              onSuggest={(date,slot)=>setSuggestModal({date,slot})}
                              {...slotProps} />
                          ))}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
          {fourWeekOffset !== 0 && (
            <p className="text-center text-xs text-gray-400 mt-3">Viewing another date range — tap Today to return.</p>
          )}
        </div>
      )}

      {addModal && <AddMealModal open={!!addModal} onClose={()=>setAddModal(null)} date={addModal.date} slotType={addModal.slot} onSelect={handleSelect} />}
      {suggestModal && <SuggestModal open={!!suggestModal} onClose={()=>setSuggestModal(null)} date={suggestModal.date} slotType={suggestModal.slot} onSelect={handleSelect} />}
      {designationModal && <DayDesignationModal key={designationModal} date={designationModal} onClose={()=>setDesignationModal(null)} />}
    </div>
  );
};

// ── MEAL LIBRARY PAGE ───────────────────────────────────────────
const MealLibrary = () => {
  const { state, dispatch } = useApp();
  const [search, setSearch] = useState('');
  const [filterCuisine, setFilterCuisine] = useState('');
  const [filterTag, setFilterTag] = useState('');
  const [showAdd, setShowAdd] = useState(false);
  const [editMeal, setEditMeal] = useState(null);

  const filtered = useMemo(() => {
    const q = search.toLowerCase();
    return state.meals.filter(m => {
      if (search) {
        const inName = m.name.toLowerCase().includes(q);
        const inDesc = (m.description || '').toLowerCase().includes(q);
        if (!inName && !inDesc) return false;
      }
      if (filterCuisine && m.cuisine !== filterCuisine) return false;
      if (filterTag && !m.tags.includes(filterTag)) return false;
      return true;
    });
  }, [state.meals, search, filterCuisine, filterTag]);

  const cuisinesUsed = [...new Set(state.meals.map(m=>m.cuisine))].sort();
  const tagsUsed = [...new Set(state.meals.flatMap(m=>m.tags))].sort();

  return (
    <div className="fade-in">
      <div className="flex items-center justify-between mb-6">
        <div>
          <h1 className="text-2xl font-bold">Meal Library</h1>
          <p className="text-sm text-gray-400 mt-0.5">{state.meals.length} meals saved</p>
        </div>
        <button onClick={()=>{setEditMeal(null);setShowAdd(true)}} className="flex items-center gap-2 px-4 py-2.5 bg-brand-500 text-white rounded-xl text-sm font-medium hover:bg-brand-600 transition shadow-lg shadow-brand-500/20">
          <Icon name="plus" size={16} /> Add Meal
        </button>
      </div>

      {/* Filters */}
      <div className="flex flex-wrap gap-2 mb-4">
        <div className="relative flex-1 min-w-[200px]">
          <Icon name="search" size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" />
          <input value={search} onChange={e=>setSearch(e.target.value)} className="w-full pl-9 pr-4 py-2 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-brand-500 outline-none bg-white" placeholder="Search meals..." />
        </div>
        <select value={filterCuisine} onChange={e=>setFilterCuisine(e.target.value)} className="px-3 py-2 border border-gray-200 rounded-xl text-sm bg-white focus:ring-2 focus:ring-brand-500 outline-none">
          <option value="">All Cuisines</option>
          {cuisinesUsed.map(c => <option key={c}>{c}</option>)}
        </select>
        <select value={filterTag} onChange={e=>setFilterTag(e.target.value)} className="px-3 py-2 border border-gray-200 rounded-xl text-sm bg-white focus:ring-2 focus:ring-brand-500 outline-none">
          <option value="">All Tags</option>
          {tagsUsed.map(t => <option key={t}>{t}</option>)}
        </select>
      </div>

      {/* Meal Grid */}
      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
        {filtered.map(m => {
          const last = getLastPlanned(state.plans, m.id, '');
          const daysAgo = last ? daysSince(last) : null;
          const withinWindow = daysAgo !== null && daysAgo < state.household.repetitionWindow;
          return (
            <div key={m.id} className="bg-white rounded-2xl border border-gray-100 p-4 hover:shadow-md transition group">
              <div className="flex items-start justify-between mb-2">
                <div className="flex-1 min-w-0">
                  <h3 className="font-semibold text-gray-900 truncate">{m.name}</h3>
                  <p className="text-sm text-gray-400">{m.cuisine} {m.prepTime?`· ${m.prepTime}min`:''}</p>
                </div>
                <div className="flex gap-1 opacity-0 group-hover:opacity-100 transition">
                  <button onClick={()=>{setEditMeal(m);setShowAdd(true)}} className="p-1.5 rounded-lg hover:bg-gray-100 text-gray-400"><Icon name="edit" size={14} /></button>
                  <button onClick={()=>dispatch({type:'DELETE_MEAL',payload:m.id})} className="p-1.5 rounded-lg hover:bg-red-50 text-red-400"><Icon name="trash" size={14} /></button>
                </div>
              </div>
              {m.description && (
                <p className="text-sm text-gray-600 line-clamp-2 mb-2">{m.description}</p>
              )}
              {mealUrlHref(m.link) && (
                <a href={mealUrlHref(m.link)} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()}
                  className="inline-flex items-center gap-1 text-xs font-medium text-brand-600 hover:text-brand-700 mb-2">
                  <Icon name="globe" size={12} /> Link
                </a>
              )}
              {m.tags.length > 0 && (
                <div className="flex flex-wrap gap-1 mb-2">
                  {m.tags.slice(0,3).map(t => <span key={t} className="text-xs px-2 py-0.5 rounded-full bg-gray-100 text-gray-500">{t}</span>)}
                  {m.tags.length > 3 && <span className="text-xs px-2 py-0.5 rounded-full bg-gray-100 text-gray-400">+{m.tags.length-3}</span>}
                </div>
              )}
              <div className="flex items-center gap-3 text-xs text-gray-400">
                {daysAgo !== null && (
                  <span className={`flex items-center gap-1 ${withinWindow?'text-amber-500 font-medium':''}`}>
                    <Icon name="clock" size={12} /> {daysAgo === 0 ? 'Today' : `${daysAgo}d ago`}
                  </span>
                )}
                {m.toddlerSafe && <span className="px-1.5 py-0.5 rounded bg-green-50 text-green-600">Toddler-safe</span>}
                {m.adultOnly && <span className="px-1.5 py-0.5 rounded bg-orange-50 text-orange-600">Adult-only</span>}
              </div>
            </div>
          );
        })}
      </div>
      {filtered.length === 0 && <p className="text-center text-gray-400 py-12">No meals match your filters.</p>}

      {showAdd && <MealForm key={editMeal?.id || 'new'} open={showAdd} onClose={()=>{setShowAdd(false);setEditMeal(null)}} meal={editMeal} />}
    </div>
  );
};

// ── MEAL FORM MODAL ─────────────────────────────────────────────
const MealForm = ({open, onClose, meal}) => {
  const { dispatch } = useApp();
  const [name, setName] = useState(meal?.name || '');
  const [cuisine, setCuisine] = useState(meal?.cuisine || 'Other');
  const [prepTime, setPrepTime] = useState(meal?.prepTime || 30);
  const [tags, setTags] = useState(new Set(meal?.tags || []));
  const [toddlerSafe, setToddlerSafe] = useState(meal?.toddlerSafe || false);
  const [adultOnly, setAdultOnly] = useState(meal?.adultOnly || false);
  const [link, setLink] = useState(meal?.link || '');
  const [description, setDescription] = useState(meal?.description || '');

  const save = () => {
    if (!name.trim()) return;
    const data = { name: name.trim(), cuisine, prepTime, tags: [...tags], toddlerSafe, adultOnly, link: link.trim(), description: description.trim() };
    if (meal) {
      dispatch({type:'UPDATE_MEAL', payload:{id: meal.id, ...data}});
    } else {
      dispatch({type:'ADD_MEAL', payload:{id: uid(), ...data, history: [], createdAt: today()}});
    }
    onClose();
  };

  const toggleTag = (t) => { const s = new Set(tags); s.has(t)?s.delete(t):s.add(t); setTags(s); };

  return (
    <Modal open={open} onClose={onClose} title={meal?'Edit Meal':'Add New Meal'}>
      <div className="space-y-4">
        <div>
          <label className="text-sm font-medium text-gray-700 mb-1 block">Meal Name *</label>
          <input value={name} onChange={e=>setName(e.target.value)} className="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-brand-500 outline-none" placeholder="e.g. Chicken Stir Fry" autoFocus />
        </div>
        <div className="grid grid-cols-2 gap-3">
          <div>
            <label className="text-sm font-medium text-gray-700 mb-1 block">Cuisine</label>
            <select value={cuisine} onChange={e=>setCuisine(e.target.value)} className="w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm bg-white focus:ring-2 focus:ring-brand-500 outline-none">
              {CUISINES.map(c => <option key={c}>{c}</option>)}
            </select>
          </div>
          <div>
            <label className="text-sm font-medium text-gray-700 mb-1 block">Prep Time (min)</label>
            <input type="number" value={prepTime} onChange={e=>setPrepTime(+e.target.value)} className="w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-brand-500 outline-none" />
          </div>
        </div>
        <div>
          <label className="text-sm font-medium text-gray-700 mb-1 block">Link <span className="text-gray-400 font-normal">(optional)</span></label>
          <input type="url" value={link} onChange={e=>setLink(e.target.value)} className="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-brand-500 outline-none" placeholder="https://… recipe or notes" />
        </div>
        <div>
          <label className="text-sm font-medium text-gray-700 mb-1 block">Description <span className="text-gray-400 font-normal">(optional)</span></label>
          <textarea value={description} onChange={e=>setDescription(e.target.value)} rows={3} className="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-brand-500 outline-none resize-y min-h-[72px]" placeholder="Notes, ingredients to buy, etc." />
        </div>
        <div>
          <label className="text-sm font-medium text-gray-700 mb-1 block">Tags</label>
          <div className="flex flex-wrap gap-1.5">
            {TAGS.map(t => (
              <button key={t} onClick={()=>toggleTag(t)} className={`text-xs px-2.5 py-1 rounded-full border transition ${tags.has(t)?'bg-brand-500 text-white border-brand-500':'bg-white text-gray-500 border-gray-200 hover:border-gray-300'}`}>{t}</button>
            ))}
          </div>
        </div>
        <div className="flex gap-4">
          <label className="flex items-center gap-2 text-sm text-gray-600 cursor-pointer">
            <input type="checkbox" checked={toddlerSafe} onChange={e=>setToddlerSafe(e.target.checked)} className="rounded border-gray-300 text-green-500 focus:ring-green-500" /> Toddler-safe
          </label>
          <label className="flex items-center gap-2 text-sm text-gray-600 cursor-pointer">
            <input type="checkbox" checked={adultOnly} onChange={e=>setAdultOnly(e.target.checked)} className="rounded border-gray-300 text-orange-500 focus:ring-orange-500" /> Adult-only
          </label>
        </div>
        <div className="flex justify-end gap-2 pt-2">
          <button onClick={onClose} className="px-4 py-2.5 text-sm text-gray-600 hover:bg-gray-100 rounded-xl transition">Cancel</button>

        </div>
      </div>
    </Modal>
  );
};

const ALL_DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

const RestaurantForm = ({open, onClose, restaurant}) => {
  const { dispatch } = useApp();
  const [name, setName] = useState(restaurant?.name || '');
  const [cuisine, setCuisine] = useState(restaurant?.cuisine || 'Other');
  const [priceRange, setPriceRange] = useState(restaurant?.priceRange || '$$');
  const [notes, setNotes] = useState(restaurant?.notes || '');
  const [isFavorite, setIsFavorite] = useState(restaurant?.isFavorite || false);
  const [openDays, setOpenDays] = useState(restaurant?.openDays || ALL_DAYS);

  const toggleDay = (day) => setOpenDays(prev =>
    prev.includes(day) ? prev.filter(d => d !== day) : [...prev, day]
  );

  const save = () => {
    if (!name.trim()) return;
    const data = { name: name.trim(), cuisine, priceRange, notes, isFavorite, openDays };
    if (restaurant) {
      dispatch({type:'UPDATE_RESTAURANT', payload:{id: restaurant.id, ...data}});
    } else {
      dispatch({type:'ADD_RESTAURANT', payload:{id: uid(), ...data, history: []}});
    }
    onClose();
  };

  return (
    <Modal open={open} onClose={onClose} title={restaurant?'Edit Restaurant':'Add Restaurant'}>
      <div className="space-y-4">
        <div>
          <label className="text-sm font-medium text-gray-700 mb-1 block">Restaurant Name *</label>
          <input value={name} onChange={e=>setName(e.target.value)} className="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-restaurant outline-none" placeholder="e.g. Olive Garden" autoFocus />
        </div>
        <div className="grid grid-cols-2 gap-3">
          <div>
            <label className="text-sm font-medium text-gray-700 mb-1 block">Cuisine</label>
            <select value={cuisine} onChange={e=>setCuisine(e.target.value)} className="w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm bg-white focus:ring-2 focus:ring-restaurant outline-none">
              {CUISINES.map(c => <option key={c}>{c}</option>)}
            </select>
          </div>
          <div>
            <label className="text-sm font-medium text-gray-700 mb-1 block">Price Range</label>
            <div className="flex gap-1">
              {['$','$$','$$$','$$$$'].map(p => (
                <button key={p} onClick={()=>setPriceRange(p)} className={`flex-1 py-2.5 rounded-xl text-sm font-medium transition border ${priceRange===p?'bg-restaurant text-white border-restaurant':'bg-white text-gray-500 border-gray-200 hover:border-gray-300'}`}>{p}</button>
              ))}
            </div>
          </div>
        </div>
        <div>
          <label className="text-sm font-medium text-gray-700 mb-2 block">Open Days</label>
          <div className="flex gap-1">
            {ALL_DAYS.map(day => (
              <button key={day} type="button" onClick={()=>toggleDay(day)}
                className={`flex-1 py-2 rounded-lg text-xs font-medium transition border ${openDays.includes(day) ? 'bg-restaurant text-white border-restaurant' : 'bg-white text-gray-400 border-gray-200 hover:border-gray-300'}`}>
                {day}
              </button>
            ))}
          </div>
          {openDays.length === 0 && <p className="text-xs text-amber-500 mt-1">Select at least one open day.</p>}
        </div>
        <div>
          <label className="text-sm font-medium text-gray-700 mb-1 block">Notes</label>
          <textarea value={notes} onChange={e=>setNotes(e.target.value)} rows={2} className="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-restaurant outline-none resize-none" placeholder="Optional notes..." />
        </div>
        <label className="flex items-center gap-2 text-sm text-gray-600 cursor-pointer">
          <input type="checkbox" checked={isFavorite} onChange={e=>setIsFavorite(e.target.checked)} className="rounded border-gray-300 text-red-500 focus:ring-red-500" /> Add to favorites
        </label>
        <div className="flex justify-end gap-2 pt-2">
          <button onClick={onClose} className="px-4 py-2.5 text-sm text-gray-600 hover:bg-gray-100 rounded-xl transition">Cancel</button>
          <button onClick={save} disabled={!name.trim()} className="px-6 py-2.5 bg-restaurant text-white rounded-xl text-sm font-medium hover:bg-restaurant-dark transition disabled:opacity-40">{restaurant?'Save':'Add Restaurant'}</button>
        </div>
      </div>
    </Modal>
  );
};

// ── EMAIL VALIDATION ─────────────────────────────────────────────
function isValidEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

// ── SETTINGS PAGE ───────────────────────────────────────────────
const Settings = () => {
  const { state, dispatch } = useApp();
  const h = state.household;
  const es = state.emailSettings || EMPTY_STATE.emailSettings;

  const updateHousehold = (updates) => dispatch({type:'UPDATE_HOUSEHOLD', payload: updates});
  const updateMember = (id, updates) => dispatch({type:'UPDATE_MEMBER', payload:{id, ...updates}});

  // Email form state
  const [emailName, setEmailName] = useState('');
  const [emailAddr, setEmailAddr] = useState('');
  const [emailError, setEmailError] = useState('');
  const [editingEmail, setEditingEmail] = useState(null);
  const [testSending, setTestSending] = useState(false);
  const [testResult, setTestResult] = useState(null);

  const addOrUpdateEmail = () => {
    const trimName = emailName.trim();
    const trimEmail = emailAddr.trim().toLowerCase();
    if (!trimName) { setEmailError('Name is required'); return; }
    if (!trimEmail) { setEmailError('Email is required'); return; }
    if (!isValidEmail(trimEmail)) { setEmailError('Invalid email address'); return; }
    // Check for duplicates (excluding the one being edited)
    const isDupe = (es.familyEmails||[]).some(e => e.email === trimEmail && e.id !== editingEmail);
    if (isDupe) { setEmailError('This email is already added'); return; }

    if (editingEmail) {
      dispatch({type:'UPDATE_FAMILY_EMAIL', payload:{id: editingEmail, name: trimName, email: trimEmail}});
      setEditingEmail(null);
    } else {
      dispatch({type:'ADD_FAMILY_EMAIL', payload:{id: uid(), name: trimName, email: trimEmail, enabled: true}});
    }
    setEmailName(''); setEmailAddr(''); setEmailError('');
  };

  const startEditEmail = (e) => {
    setEditingEmail(e.id);
    setEmailName(e.name);
    setEmailAddr(e.email);
    setEmailError('');
  };

  const cancelEdit = () => {
    setEditingEmail(null);
    setEmailName(''); setEmailAddr(''); setEmailError('');
  };

  const sendTestEmail = async () => {
    setTestSending(true); setTestResult(null);
    try {
      // This calls the Cloud Function test endpoint
      const functionsBase = window.CLOUD_FUNCTIONS_URL || '';
      if (!functionsBase) {
        setTestResult({ok: false, msg: 'Cloud Functions URL not configured. Set window.CLOUD_FUNCTIONS_URL.'});
        setTestSending(false);
        return;
      }
      const res = await fetch(`${functionsBase}/sendTestEmail`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({firebaseUrl: FIREBASE_URL}),
      });
      const data = await res.json();
      setTestResult({
        ok: data.success,
        msg: data.message || (data.success ? 'Test emails sent!' : 'Failed to send.'),
        results: Array.isArray(data.results) ? data.results : null,
      });
    } catch(err) {
      setTestResult({ok: false, msg: 'Could not reach Cloud Functions. Check your setup.'});
    }
    setTestSending(false);
  };

  // Yesterday's confirmation status
  const yesterday = (() => {
    const d = new Date();
    d.setDate(d.getDate() - 1);
    return d.toISOString().split('T')[0];
  })();
  const yesterdayConfirmed = es.confirmations?.[yesterday]?.confirmed;

  return (
    <div className="fade-in max-w-2xl">
      <h1 className="text-2xl font-bold mb-6">Settings</h1>

      {/* Yesterday's Confirmation Banner */}
      {!yesterdayConfirmed && (
        <section className="bg-brand-50 border border-brand-200 rounded-2xl p-4 mb-6 flex items-center justify-between">
          <div>
            <p className="text-sm font-medium text-brand-700">Were yesterday's meals correct?</p>
            <p className="text-xs text-brand-500 mt-0.5">Confirm that the plan for {new Date(yesterday+'T12:00:00').toLocaleDateString('en-US',{weekday:'long', month:'short', day:'numeric'})} was followed.</p>
          </div>
          <button
            onClick={() => dispatch({type:'CONFIRM_DAY', payload: yesterday})}
            className="px-4 py-2 bg-brand-500 text-white rounded-xl text-sm font-medium hover:bg-brand-600 transition flex items-center gap-1.5 shrink-0"
          ><Icon name="check" size={16} /> Confirm</button>
        </section>
      )}
      {yesterdayConfirmed && (
        <section className="bg-green-50 border border-green-200 rounded-2xl p-4 mb-6 flex items-center gap-3">
          <span className="text-green-600"><Icon name="check" size={20} /></span>
          <p className="text-sm text-green-700">Yesterday's meals confirmed <span className="text-green-500">({new Date(es.confirmations[yesterday].timestamp).toLocaleTimeString()})</span></p>
        </section>
      )}

      {/* Household */}
      <section className="bg-white rounded-2xl border border-gray-100 p-6 mb-6">
        <h2 className="font-semibold text-lg mb-4">Household</h2>
        <div className="mb-4">
          <label className="text-sm font-medium text-gray-700 mb-1 block">Household Name</label>
          <input value={h.name} onChange={e=>updateHousehold({name:e.target.value})} className="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-brand-500 outline-none" />
        </div>
      </section>

      {/* Members */}
      <section className="bg-white rounded-2xl border border-gray-100 p-6 mb-6">
        <h2 className="font-semibold text-lg mb-4 flex items-center gap-2"><Icon name="users" size={20} /> Members</h2>
        <div className="space-y-4">
          {h.members.map(m => (
            <div key={m.id} className="p-4 bg-gray-50 rounded-xl">
              <div className="flex items-center gap-3 mb-3">
                <span className="text-xl">{m.type==='adult'?'👤':'👶'}</span>
                <input value={m.name} onChange={e=>updateMember(m.id,{name:e.target.value})} className="flex-1 px-3 py-2 bg-white border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-brand-500 outline-none" />
                <span className="text-xs text-gray-400 capitalize">{m.type}{m.age?` · ${m.age}yr`:''}</span>
              </div>
              <div className="grid grid-cols-1 sm:grid-cols-3 gap-2">
                <div>
                  <label className="text-xs font-medium text-gray-500 mb-1 block">Dietary Preferences</label>
                  <input value={m.preferences.dietary.join(', ')} onChange={e=>updateMember(m.id,{preferences:{...m.preferences,dietary:e.target.value.split(',').map(s=>s.trim()).filter(Boolean)}})}
                    className="w-full px-2 py-1.5 bg-white border border-gray-200 rounded-lg text-xs focus:ring-2 focus:ring-brand-500 outline-none" placeholder="Vegetarian, etc." />
                </div>
                <div>
                  <label className="text-xs font-medium text-gray-500 mb-1 block">Dislikes</label>
                  <input value={m.preferences.dislikes.join(', ')} onChange={e=>updateMember(m.id,{preferences:{...m.preferences,dislikes:e.target.value.split(',').map(s=>s.trim()).filter(Boolean)}})}
                    className="w-full px-2 py-1.5 bg-white border border-gray-200 rounded-lg text-xs focus:ring-2 focus:ring-brand-500 outline-none" placeholder="Mushrooms, etc." />
                </div>
                <div>
                  <label className="text-xs font-medium text-gray-500 mb-1 block">Allergens</label>
                  <input value={m.preferences.allergens.join(', ')} onChange={e=>updateMember(m.id,{preferences:{...m.preferences,allergens:e.target.value.split(',').map(s=>s.trim()).filter(Boolean)}})}
                    className="w-full px-2 py-1.5 bg-white border border-gray-200 rounded-lg text-xs focus:ring-2 focus:ring-brand-500 outline-none" placeholder="Nuts, dairy, etc." />
                </div>
              </div>
            </div>
          ))}
        </div>
      </section>

      {/* Email Reminders */}
      <section className="bg-white rounded-2xl border border-gray-100 p-6 mb-6">
        <h2 className="font-semibold text-lg mb-1 flex items-center gap-2"><Icon name="mail" size={20} /> Email Reminders</h2>
        <p className="text-xs text-gray-400 mb-4">Send daily meal summaries to family members every morning at 8 AM.</p>

        {/* Timezone */}
        <div className="mb-5">
          <label className="text-sm font-medium text-gray-700 mb-1.5 flex items-center gap-1.5 block"><Icon name="globe" size={14} /> Timezone</label>
          <select
            value={es.timezone}
            onChange={e => dispatch({type:'SET_TIMEZONE', payload: e.target.value})}
            className="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-brand-500 outline-none bg-white"
          >
            {TIMEZONES.map(tz => <option key={tz} value={tz}>{tz.replace(/_/g,' ')}</option>)}
          </select>
          <p className="text-xs text-gray-400 mt-1">Emails will be sent at 8:00 AM in this timezone.</p>
        </div>

        {/* Family email list */}
        <div className="mb-4">
          <label className="text-sm font-medium text-gray-700 mb-2 block">Family Members</label>
          {(es.familyEmails||[]).length === 0 && (
            <p className="text-sm text-gray-400 mb-3 py-4 text-center bg-gray-50 rounded-xl">No email recipients yet. Add family members below.</p>
          )}
          <div className="space-y-2 mb-4">
            {(es.familyEmails||[]).map(fe => (
              <div key={fe.id} className="flex items-center gap-3 p-3 bg-gray-50 rounded-xl group">
                <button
                  onClick={() => dispatch({type:'UPDATE_FAMILY_EMAIL', payload:{id:fe.id, enabled: !fe.enabled}})}
                  className={`w-10 h-6 rounded-full transition-colors relative shrink-0 ${fe.enabled ? 'bg-brand-500' : 'bg-gray-300'}`}
                >
                  <span className={`absolute top-0.5 w-5 h-5 bg-white rounded-full shadow transition-transform ${fe.enabled ? 'left-[18px]' : 'left-0.5'}`} />
                </button>
                <div className="flex-1 min-w-0">
                  <p className="text-sm font-medium text-gray-800 truncate">{fe.name}</p>
                  <p className="text-xs text-gray-400 truncate">{fe.email}</p>
                </div>
                <div className="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition">
                  <button onClick={() => startEditEmail(fe)} className="p-1.5 rounded-lg hover:bg-white text-gray-400 hover:text-gray-600"><Icon name="edit" size={14} /></button>
                  <button onClick={() => { if(confirm(`Remove ${fe.name}?`)) dispatch({type:'REMOVE_FAMILY_EMAIL', payload:fe.id}); }} className="p-1.5 rounded-lg hover:bg-red-50 text-gray-400 hover:text-red-500"><Icon name="trash" size={14} /></button>
                </div>
              </div>
            ))}
          </div>

          {/* Add/Edit email form */}
          <div className="p-4 border border-dashed border-gray-200 rounded-xl bg-gray-50/50">
            <p className="text-xs font-medium text-gray-500 mb-2">{editingEmail ? 'Edit recipient' : 'Add new recipient'}</p>
            <div className="flex flex-col sm:flex-row gap-2">
              <input
                value={emailName} onChange={e => {setEmailName(e.target.value); setEmailError('');}}
                placeholder="Name" className="flex-1 px-3 py-2 bg-white border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-brand-500 outline-none"
              />
              <input
                value={emailAddr} onChange={e => {setEmailAddr(e.target.value); setEmailError('');}}
                placeholder="email@example.com" type="email"
                className="flex-1 px-3 py-2 bg-white border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-brand-500 outline-none"
                onKeyDown={e => { if (e.key === 'Enter') addOrUpdateEmail(); }}
              />
              <div className="flex gap-2">
                <button onClick={addOrUpdateEmail}
                  className="px-4 py-2 bg-brand-500 text-white rounded-lg text-sm font-medium hover:bg-brand-600 transition">
                  {editingEmail ? 'Update' : 'Add'}
                </button>
                {editingEmail && (
                  <button onClick={cancelEdit} className="px-3 py-2 text-sm text-gray-500 hover:bg-gray-100 rounded-lg transition">Cancel</button>
                )}
              </div>
            </div>
            {emailError && <p className="text-red-500 text-xs mt-1.5">{emailError}</p>}
          </div>
        </div>

        {/* Test email button */}
        <div className="pt-2 border-t border-gray-100 space-y-2">
          <div className="flex flex-col sm:flex-row sm:items-start gap-3">
            <button
              onClick={sendTestEmail}
              disabled={testSending || (es.familyEmails||[]).filter(e=>e.enabled).length === 0}
              className="px-4 py-2.5 text-sm font-medium border border-brand-200 text-brand-600 rounded-xl hover:bg-brand-50 transition disabled:opacity-40 flex items-center gap-2 shrink-0"
            >
              <Icon name="send" size={14} />
              {testSending ? 'Sending...' : 'Send Test Email'}
            </button>
            {testResult && (
              <div className="flex-1 min-w-0">
                <p className={`text-xs font-medium ${testResult.ok ? 'text-green-600' : 'text-red-500'}`}>{testResult.msg}</p>
                {testResult.results && testResult.results.length > 0 && (
                  <ul className="mt-2 text-xs text-gray-600 space-y-1 list-none pl-0">
                    {testResult.results.map((r, i) => (
                      <li key={i} className={`rounded-lg px-2 py-1.5 ${r.sent ? 'bg-green-50 text-green-800' : 'bg-red-50 text-red-700'}`}>
                        <span className="font-medium">{r.email}</span>
                        {r.sent ? (
                          r.resendId ? <span className="text-green-600"> — ok (id: {r.resendId})</span> : <span className="text-green-600"> — sent</span>
                        ) : (
                          <span className="block mt-0.5 text-red-600 break-words">{r.error || 'Unknown error'}</span>
                        )}
                      </li>
                    ))}
                  </ul>
                )}
                <p className="text-[10px] text-gray-400 mt-2">Tip: you can also open DevTools → Network, click the <code className="bg-gray-100 px-0.5 rounded">sendTestEmail</code> request, and read the JSON response under “Response”.</p>
              </div>
            )}
          </div>
        </div>
      </section>

      {/* Repetition Avoidance */}
      <section className="bg-white rounded-2xl border border-gray-100 p-6 mb-6">
        <h2 className="font-semibold text-lg mb-4">Repetition Avoidance</h2>
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label className="text-sm font-medium text-gray-700 mb-2 block">Window (days)</label>
            <div className="flex gap-2">
              {[7,14,21,30].map(w => (
                <button key={w} onClick={()=>updateHousehold({repetitionWindow:w})}
                  className={`flex-1 py-2.5 rounded-xl text-sm font-medium transition border ${h.repetitionWindow===w?'bg-brand-500 text-white border-brand-500':'bg-white text-gray-500 border-gray-200 hover:border-gray-300'}`}>{w}d</button>
              ))}
            </div>
          </div>
          <div>
            <label className="text-sm font-medium text-gray-700 mb-2 block">Mode</label>
            <div className="flex gap-2">
              <button onClick={()=>updateHousehold({repetitionMode:'warn'})}
                className={`flex-1 py-2.5 rounded-xl text-sm font-medium transition border ${h.repetitionMode==='warn'?'bg-amber-500 text-white border-amber-500':'bg-white text-gray-500 border-gray-200 hover:border-gray-300'}`}>Warn</button>
              <button onClick={()=>updateHousehold({repetitionMode:'block'})}
                className={`flex-1 py-2.5 rounded-xl text-sm font-medium transition border ${h.repetitionMode==='block'?'bg-red-500 text-white border-red-500':'bg-white text-gray-500 border-gray-200 hover:border-gray-300'}`}>Block</button>
            </div>
          </div>
        </div>
        <p className="text-xs text-gray-400 mt-3">
          {h.repetitionMode === 'warn' ? 'Meals within the window will show a yellow warning but can still be added.' : 'Meals within the window will be blocked from being added.'}
        </p>
      </section>

      {/* Data */}
      <section className="bg-white rounded-2xl border border-gray-100 p-6">
        <h2 className="font-semibold text-lg mb-4">Data</h2>
        <div className="flex gap-3">
          <button onClick={()=>{if(confirm('Reset all data? This cannot be undone.')){safeLocalRemove('familyplate');fetch(FIREBASE_URL,{method:'DELETE'}).finally(()=>location.reload());}}}
            className="px-4 py-2.5 text-sm text-red-600 border border-red-200 rounded-xl hover:bg-red-50 transition">Reset All Data</button>
        </div>
      </section>
    </div>
  );
};
