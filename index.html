// ── REDUCER ─────────────────────────────────────────────────────
function appReducer(state, action) {
  switch(action.type) {
    case 'LOAD': {
      const normalized = normalizeFirebaseData(action.payload) || action.payload;
      return {...EMPTY_STATE, ...normalized};
    }
    case 'SETUP': return {...state, ...action.payload};
    case 'ADD_MEAL': return {...state, meals: [...state.meals, action.payload]};
    case 'UPDATE_MEAL': return {...state, meals: state.meals.map(m => m.id===action.payload.id ? {...m,...action.payload} : m)};
    case 'DELETE_MEAL': return {...state, meals: state.meals.filter(m => m.id !== action.payload)};
    case 'ADD_RESTAURANT': return {...state, restaurants: [...state.restaurants, action.payload]};
    case 'UPDATE_RESTAURANT': return {...state, restaurants: state.restaurants.map(r => r.id===action.payload.id ? {...r,...action.payload} : r)};
    case 'DELETE_RESTAURANT': return {...state, restaurants: state.restaurants.filter(r => r.id !== action.payload)};
    case 'TOGGLE_FAV': return {...state, restaurants: state.restaurants.map(r => r.id===action.payload ? {...r, isFavorite:!r.isFavorite} : r)};
    case 'SET_SLOT': {
      const {date, slot, data} = action.payload;
      const plans = {...state.plans};
      if (!plans[date]) plans[date] = {};
      plans[date] = {...plans[date], [slot]: data};
      return {...state, plans};
    }
    case 'SWAP_SLOTS': {
      const { from, to } = action.payload;
      const fromData = state.plans[from.date]?.[from.slot] || { type: 'empty' };
      const toData   = state.plans[to.date]?.[to.slot]   || { type: 'empty' };
      const plans = { ...state.plans };
      if (!plans[from.date]) plans[from.date] = {};
      if (!plans[to.date])   plans[to.date]   = {};
      plans[from.date] = { ...plans[from.date], [from.slot]: toData };
      plans[to.date]   = { ...plans[to.date],   [to.slot]:   fromData };
      return { ...state, plans };
    }
    case 'SET_DAY_DESIGNATION': {
      const { date, label } = action.payload;
      const next = { ...(state.dayDesignations || {}) };
      const t = typeof label === 'string' ? label.trim().slice(0, 80) : '';
      if (!t) delete next[date];
      else next[date] = t;
      return { ...state, dayDesignations: next };
    }
    case 'UPDATE_HOUSEHOLD': return {...state, household: {...state.household, ...action.payload}};
    case 'UPDATE_MEMBER': {
      const {id, ...updates} = action.payload;
      return {...state, household: {...state.household, members: state.household.members.map(m => m.id===id ? {...m,...updates} : m)}};
    }
    case 'ADD_FAMILY_EMAIL': {
      const es = state.emailSettings || EMPTY_STATE.emailSettings;
      return {...state, emailSettings: {...es, familyEmails: [...(es.familyEmails||[]), action.payload]}};
    }
    case 'UPDATE_FAMILY_EMAIL': {
      const es = state.emailSettings || EMPTY_STATE.emailSettings;
      return {...state, emailSettings: {...es, familyEmails: (es.familyEmails||[]).map(e => e.id===action.payload.id ? {...e,...action.payload} : e)}};
    }
    case 'REMOVE_FAMILY_EMAIL': {
      const es = state.emailSettings || EMPTY_STATE.emailSettings;
      return {...state, emailSettings: {...es, familyEmails: (es.familyEmails||[]).filter(e => e.id !== action.payload)}};
    }
    case 'SET_TIMEZONE': {
      const es = state.emailSettings || EMPTY_STATE.emailSettings;
      return {...state, emailSettings: {...es, timezone: action.payload}};
    }
    case 'CONFIRM_DAY': {
      const es = state.emailSettings || EMPTY_STATE.emailSettings;
      return {...state, emailSettings: {...es, confirmations: {...(es.confirmations||{}), [action.payload]: {confirmed: true, timestamp: new Date().toISOString()}}}};
    }
    default: return state;
  }
}

// ── APP ─────────────────────────────────────────────────────────
const App = () => {
  const [state, dispatch] = React.useReducer(appReducer, INITIAL_STATE);
  const [page, setPage] = useState('calendar');
  const [syncing, setSyncing] = useState(true);

  // Handle deep links from email (e.g., ?date=2026-03-18&addSlot=breakfast)
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    if (params.has('date') || params.has('addSlot')) {
      setPage('calendar');
      // Clean URL without reloading
      window.history.replaceState({}, '', window.location.pathname);
    }
  }, []);

  // On mount, fetch latest data from Firebase (authoritative source)
  useEffect(() => {
    loadFromFirebase().then(data => {
      if (data) dispatch({ type: 'LOAD', payload: data });
      setSyncing(false);
    }).catch(() => setSyncing(false));
  }, []);

  // Persist to localStorage + Firebase on every state change
  useEffect(() => { if (!syncing) saveState(state); }, [state]);

  if (syncing) return (
    <div className="min-h-screen bg-gray-50 flex items-center justify-center">
      <div className="text-center">
        <div className="text-4xl mb-3">🍽️</div>
        <p className="text-gray-500 text-sm">Loading family data…</p>
      </div>
    </div>
  );

  if (!state.onboarded) {
    return (
      <AppContext.Provider value={{state, dispatch}}>
        <Onboarding />
      </AppContext.Provider>
    );
  }

  const pages = {
    calendar: <WeeklyCalendar />,
    library: <MealLibrary />,
    restaurants: <Restaurants />,
    settings: <Settings />,
  };

  return (
    <AppContext.Provider value={{state, dispatch}}>
      <div className="flex min-h-screen bg-gray-50">
        <Sidebar page={page} setPage={setPage} />
        <main className="flex-1 md:p-8 p-4 pb-24 md:pb-8 max-w-6xl">
          <MobileHeader page={page} />
          {pages[page]}
        </main>
        <MobileNav page={page} setPage={setPage} />
      </div>
    </AppContext.Provider>
  );
};
